services:
  # Development - hot reload with source mounts
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=./worpple.db
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.svelte-kit
    command: npm run dev -- --host 0.0.0.0 --port 5173

  # Production - built app
  web:
    build:
      context: .
      target: production
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/data/worpple.db
    volumes:
      - worpple_data:/data
    restart: unless-stopped

  # PostgreSQL variant - swap DATABASE_URL when ready
  # db:
